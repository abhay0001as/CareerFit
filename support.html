<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support | CareerFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0052cc;
            --dark: #091e42;
            --bg: #f4f5f7;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .support-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            color: var(--dark);
            margin-bottom: 10px;
        }

        p {
            color: #6b778c;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .contact-info {
            background: var(--bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid #dfe1e6;
        }

        .contact-info strong {
            display: block;
            color: var(--primary);
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .contact-info span {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            border: 2px solid var(--primary);
            padding: 12px 25px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>

    <div class="support-card">
        <span class="icon">🎧</span>
        <h1>How can we help?</h1>
        <p>Our team is available Monday to Friday (9 AM - 6 PM) to assist you with your career journey.</p>

        <div class="contact-info">
            <strong>📧 Email Support</strong>
            <span>support@careerfit.com</span>
        </div>

        <div class="contact-info">
            <strong>📞 Phone / WhatsApp</strong>
            <span>+91 8287678704</span>
        </div>

        <div class="contact-info">
            <strong>📍 Office Location</strong>
            <span>New Delhi, India</span>
        </div>

        <a href="search.html" class="btn-back">← Back to Search</a>
    </div>

</body>

</html>
