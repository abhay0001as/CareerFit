<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Login | CareerFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0052cc;
            --dark: #091e42;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-area h2 {
            color: var(--primary);
            font-weight: 800;
            margin: 0;
        }

        /* Tab Switcher */
        .tabs {
            display: flex;
            background: #f0f2f5;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            color: #6b778c;
            transition: 0.3s;
        }

        .tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 2px solid #edeff2;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #0747a6;
            transform: translateY(-2px);
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #6b778c;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-area">
            <h2>CareerFit</h2>
            <p style="color: #6b778c; font-size: 14px;">Login to find your dream job</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('mobile')">Mobile Number</button>
            <button class="tab" onclick="switchTab('email')">Email ID</button>
        </div>

        <div id="mobileSection" class="form-section active">
            <input type="tel" id="userMobile" placeholder="Enter Mobile Number">
            <button onclick="handleLogin('mobile')" class="btn-login">Login with OTP</button>
        </div>

        <div id="emailSection" class="form-section">
            <input type="email" id="userEmail" placeholder="Enter Email Address">
            <input type="password" id="userPass" placeholder="Enter Password">
            <button onclick="handleLogin('email')" class="btn-login">Login with Password</button>
        </div>

        <div class="footer-link">
            New here? <a href="#">Register for Free</a>
        </div>
    </div>

    <script>
        // Tab switching logic
        function switchTab(type) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Update sections
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            if (type === 'mobile') {
                document.getElementById('mobileSection').classList.add('active');
            } else {
                document.getElementById('emailSection').classList.add('active');
            }
        }

        // Login logic
        function handleLogin(type) {
            if (type === 'mobile') {
                const mobile = document.getElementById('userMobile').value;
                if (mobile.length < 10) {
                    alert("Please enter a valid 10-digit mobile number");
                    return;
                }
            } else {
                const email = document.getElementById('userEmail').value;
                const pass = document.getElementById('userPass').value;
                if (!email || !pass) {
                    alert("Please fill in both Email and Password");
                    return;
                }
            }

            // Save session
            localStorage.setItem('isLoggedIn', 'true');
            alert("Login Successful!");
            window.location.href = 'search.html';
        }
    </script>

</body>

</html>
